# Gemini 提示詞模板配置

# 圖片生成提示詞
image_generation:
  # 角色基礎提示詞
  character_base:
    style: "現代2D動畫風格，參考日本動漫和皮克斯的結合，色彩鮮明飽和，線條流暢，可愛討喜的角色設計"
    quality_tags: "高質量，細節豐富，專業動畫製作水準，4K解析度"
    negative_prompt: "模糊，低質量，變形，解剖錯誤，恐怖谷效應，多餘的手指，臉部畸變"

  # 場景基礎提示詞
  scene_base:
    style: "現代動畫場景設計，溫馨明亮，富有層次感，適合兒童觀看，柔和的光線處理"
    quality_tags: "高質量背景，細節豐富，景深效果，環境光線自然，專業動畫水準"
    negative_prompt: "模糊，低質量，雜亂，不協調的顏色，變形"

  # 表情提示詞模板
  expressions:
    happy: "開心地笑著，眼睛瞇成一條線，嘴角上揚，露出整齊的牙齒，雙手高舉歡呼，身體微微後仰。現代動畫風格，明亮的色彩。"
    sad: "垂頭喪氣，眉頭緊皺，嘴角下垂，眼眶含淚即將落淚，身體微微前傾，雙手無力地垂下。現代動畫風格，略微陰沉的色調。"
    surprised: "瞪大眼睛，嘴巴張成O型，一隻手摸著頭或其他部位做吃驚狀，表情誇張可愛。現代動畫風格。"
    thinking: "歪著頭，一隻手托著下巴，眼睛看向上方或斜前方，若有所思的表情。現代動畫風格。"
    confused: "撓頭皺眉，一隻眼睛睜一隻眼閉，嘴巴歪向一邊，做出不理解或困惑的表情。現代動畫風格。"
    angry: "眉頭倒豎，咬牙切齒，臉漲得通紅，雙手叉腰或握拳。現代動畫風格。"
    proud: "雙手叉腰，下巴抬高，嘴角上揚帶著自信的笑容，眼睛裡閃爍著得意。現代動畫風格。"
    embarrassed: "臉紅害羞，雙手不知道放在哪裡，眼神飄忽不定，略微低下頭。現代動畫風格，粉色調。"

  # 動作提示詞模板
  actions:
    reading: "坐在書桌前，雙手捧著書或翻開的書本，專注地閱讀，表情認真。現代動畫風格，場景中有書桌、檯燈等。"
    running: "向前奔跑的姿勢，衣角飄動，頭髮飛揚，表情興奮充滿活力，肢體動作誇張生動。現代動畫風格。"
    pointing: "伸出一隻手，手指指向某個方向或物品，表情認真或好奇。現代動畫風格。"
    presenting: "雙手展開，做出展示或演講的姿勢，身體挺直，表情自豪或認真。現代動戲風格。"
    sitting: "坐在椅子或地上，姿態放鬆自然，可以做聊天或休息的姿勢。現代動畫風格。"
    standing: "自然站立，姿態放鬆，可以雙手交叉胸前或背後。現代動畫風格。"
    walking: "正常行走中的姿勢，表情自然，環境互動。現代動畫風格。"
    waving: "揮手打招呼或再見，表情友善開朗。現代動畫風格。"
    celebrating: "雙手高舉歡呼，跳躍或蹦跳，表情極度興奮開心。現代動畫風格，繽紛的煙火或閃光效果。"
    explaining: "雙手配合說話做手勢，表情生動，嘴巴張開似在說話。現代動畫風格。"

# 文本生成提示詞
text_generation:
  # 故事生成提示詞
  story_generation:
    system_prompt: "你是一個專業的兒童故事編劇，擅長將中國成語改編生動有趣的現代小故事。故事結構遵循「起承轉合」：起(介紹背景)、承(故事發展)、轉(高潮/成語應用)、合(結尾教訓)。"
    format: "JSON"
    language: "繁體中文"

  # 場景描述生成提示詞
  scene_description:
    system_prompt: "你是一個專業的動畫分鏡設計師，擅長描述生動的動畫場景。"
    include: ["角色動作", "角色表情", "場景環境", "光線氛圍"]

# 視頻配置
video:
  # 轉場效果
  transitions:
    default: "fade"
    options:
      - fade
      - dissolve
      - slide_left
      - slide_right

  # 字幕動畫
  subtitle_animation:
    fade_in_duration: 0.3
    fade_out_duration: 0.3
    position: "bottom"
    margin_bottom: 50
